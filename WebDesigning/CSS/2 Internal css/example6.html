<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* element selector */
        div{
            height: 150px;
            width: 150px;
            border-width: 10px;
            float: left;
            margin: 10px;
            border-color:black;
        }
        /* id selector */
        #demo1{
            border-style: solid;
        }
        #demo2{
            border-style: dotted;
        }
        #demo3{
            border-style: dashed;
        }
        #demo4{
            border-style: double;
        }
        #demo5{
            border-style: inset;
        }
        #demo6{
            border-style: outset;
        }
        #demo7{
            border-style: groove;
        }
        #demo8{
            border-style: ridge;
        }
        #demo9{
            border-style: solid dotted;
        }
        #demo10{
            border-style: solid dotted dashed;
        }
        #demo11{
            border-style: solid dotted dashed double;
        }
    </style>
</head>
<body>
    <div id="demo1"></div>    
    <div id="demo2"></div>    
    <div id="demo3"></div>
    <div id="demo4"></div>
    <div id="demo5"></div>
    <div id="demo6"></div>
    <div id="demo7"></div>
    <div id="demo8"></div>
    <div id="demo9"></div>
    <div id="demo10"></div>
    <div id="demo11"></div>
</body>
</html>
