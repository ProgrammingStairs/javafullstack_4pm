<head>

    <title>Document</title>
    <style>
        /* element | tag selector */
        span{
            color:red
        }
        /* descendent selector */
        p span{
            color:orange;
        }
        div p span {
            color:purple;
        }
    </style>
</head>

        <p>

        </p>
