<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* element selector */
        div{
            height: 150px;
            width: 150px;
            border-width: 2px;
            float: left;
            margin: 30px;
            border-style: solid;
            border-color:red;
            outline-style:solid;
            outline-width: 5px;
            outline-color: red;
            outline-offset: 10px;
            border-radius: 50%;
        }
        /* class selector */
        .demo1{
            background-color: red;
        }
        .demo2{
            background: linear-gradient(red,white);
        }
        .demo3{
            background: linear-gradient(red,white,crimson);
        }
        .demo4{
            background: linear-gradient(90deg,red,white,crimson);
        }
        .demo5{
            background: linear-gradient(red 20%,white 60%,crimson 20%);
        }
        .demo6{
            background: repeating-linear-gradient(red 20%,white 60%,crimson 20%);
        }
        .demo7{
            background: radial-gradient(red 20%,white 60%);
        }
        .demo8{
            background: repeating-radial-gradient(red 20%,white 60%,crimson 20%);
        }
        .demo9{
            background: radial-gradient(red,white);
        }
        .demo10{
            background: repeating-radial-gradient(red 20%,white 30%);
        }
    </style>
</head>
<body>
    <div class="demo1"></div>    
    <div class="demo2"></div>    
    <div class="demo3"></div>
    <div class="demo4"></div>
    <div class="demo5"></div>
    <div class="demo6"></div>
    <div class="demo7"></div>
    <div class="demo8"></div>
    <div class="demo9"></div>
    <div class="demo10"></div>
</body>
</html>
