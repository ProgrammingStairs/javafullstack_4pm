<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* element selector */
        div{
            height: 150px;
            width: 150px;
            border-width: 2px;
            float: left;
            margin: 30px;
            border-style: solid;
            border-color:red;
            outline-style:solid;
            outline-width: 5px;
            outline-color: red;
            outline-offset: 10px;
        }
        /* class selector */
        .demo1{
            background-color: red;
            border-radius: 20px;
        }
        .demo2{
            background: linear-gradient(red,white);
            border-radius: 50px;
        }
        .demo3{
            background: linear-gradient(red,white,crimson);
            border-radius: 50%;
        }
        .demo4{
            background: linear-gradient(90deg,red,white,crimson);
            border-radius: 10% 50% 20% 80%;
        }
        .demo5{
            background: linear-gradient(red 20%,white 60%,crimson 20%);
            border-radius: 50% 50% 0% 0%;
        }
        .demo6{
            background: repeating-linear-gradient(red 20%,white 60%,crimson 20%);
            border-radius: 50% 0% 50% 0%;
        }
        .demo7{
            background: radial-gradient(red 20%,white 60%);
            border-radius: 100% 0% 0% 0%;
        }
        .demo8{
            background: repeating-radial-gradient(red 20%,white 60%,crimson 20%);
            border-radius: 100% 0% 100% 0%;
        }
        .demo9{
            background: radial-gradient(red,white);
            border-radius: 100% 100% 100% 0%;
        }
        .demo10{
            background: repeating-radial-gradient(red 20%,white 30%);
            border-radius: 30% 30% 80% 80%;
        }
    </style>
</head>
<body>
    <div class="demo1"></div>    
    <div class="demo2"></div>    
    <div class="demo3"></div>
    <div class="demo4"></div>
    <div class="demo5"></div>
    <div class="demo6"></div>
    <div class="demo7"></div>
    <div class="demo8"></div>
    <div class="demo9"></div>
    <div class="demo10"></div>
</body>
</html>
