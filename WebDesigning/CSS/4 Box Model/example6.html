<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .demo{
            height:300px;
            width:200px;
            float: left;
        }
        #demo1{
            background-color: hsl(60,20%,100%);
        }
        #demo2{
            background-color: hsl(60,40%,80%);
        }
        #demo3{
            background-color: hsl(60,60%,60%);
        }
        #demo4{
            background-color: hsl(60,80%,40%);
        }
        #demo5{
            background-color: hsl(60,100%,20%);
        }

</style>
</head>
<body>
    <div id="demo1" class="demo"></div>
    <div id="demo2" class="demo"></div>
    <div id="demo3" class="demo"></div>
    <div id="demo4" class="demo"></div>
    <div id="demo5" class="demo"></div>
</body>
</html>
